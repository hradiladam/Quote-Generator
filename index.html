<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./css/reset.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script src="./js/script.js" defer></script>
    <title>Document</title>
</head>

<body>
    <section class="quote-container">
        <h1>Random Quote Generator</h1>
        
        <!-- Display the generated quote here -->
        <p id="quote-display">Click the button to generate a random quote.</p>

        <div class="button-container">
            <!-- Button to trigger the quote generation -->
            <button id="previous-quote-button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="24" height="24"><!--!Font Awesome Free 6.7.1 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2024 Fonticons, Inc.-->
                    <path fill = "currentColor "d="M48.5 224L40 224c-13.3 0-24-10.7-24-24L16 72c0-9.7 5.8-18.5 14.8-22.2s19.3-1.7 26.2 5.2L98.6 96.6c87.6-86.5 228.7-86.2 315.8 1c87.5 87.5 87.5 229.3 0 316.8s-229.3 87.5-316.8 0c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0c62.5 62.5 163.8 62.5 226.3 0s62.5-163.8 0-226.3c-62.2-62.2-162.7-62.5-225.3-1L185 183c6.9 6.9 8.9 17.2 5.2 26.2s-12.5 14.8-22.2 14.8L48.5 224z"/>
                </svg>
            </button>

            <!-- Button to display the previous quote -->
            <button id="generate-quote-button">
                Generate Quote
            </button>
        </div>
    </section>

    <!-- Button to trigger dark theme -->
    <label id="theme-switch">
        <input type="checkbox"/>
        <span class="slider"></span>
    </label>
</body>
</html>
