<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./css/reset.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script src="./js/script.js" defer></script>
    <title>Document</title>
</head>

<body>
    <section class="quote-container">
        <h1>Random Quote Generator</h1>
        
        <!-- Display the generated quote here -->
        <p id="quote-display">Click the button to generate a random quote.</p>

        <div class="button-container">
            <!-- Button to trigger the quote generation -->
            <button id="previous-quote-button">
                <i class="fas fa-arrow-left"></i>
            </button>
            <!-- Button to display the previous quote -->
            <button id="generate-quote-button">Generate Quote</button>
        </div>


    </section>

    

    <!-- Button to trigger dark theme -->
    <label id="theme-switch">
        <input type="checkbox"/>
        <span class="slider"></span>
    </label>
</body>
</html>
